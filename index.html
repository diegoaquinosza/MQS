<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQS - Mano, qual é a sala?!</title>
    <meta name="theme-color" content="#00897b">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="home.css">

    <link rel="manifest" href="manifest.json">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <meta name="apple-mobile-web-app-title" content="MQS">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>

<body>

    <main class="zen-container">

        <header class="hero-card">
            <img src="./assets/banner-mqs2.png" alt="Banner MQS" class="hero-image">
        </header>

        <div id="tip-container" class="tip-context-header hidden">
            <span id="warm-tip-icon" class="tip-icon">💡</span>
            <p id="warm-tip-text" class="tip-text">Carregando sua dose de sabedoria...</p>
        </div>

        <div id="warm-welcome" class="warm-card hidden">

            <div class="saved-context-group">
                <div class="saved-context-box">
                    <span id="saved-course">Curso Salvo</span>
                    <span id="saved-details">Detalhes Salvos</span>
                </div>
                <button id="btn-quick-access" class="cta-primary">
                    Ver grade padrão
                </button>
            </div>

            <div class="warm-divider">
                <span>Opções Avançadas</span>
            </div>

            <div class="warm-action-group">
                <button id="btn-custom-access" class="btn-tonal outline-btn">
                    <span class="material-symbols-rounded" id="icon-custom-access">tune</span>
                    <span id="text-custom-access">Ver minha grade</span>
                </button>

                <button id="btn-edit-custom" class="btn-tonal outline-btn hidden">
                    <span class="material-symbols-rounded">edit</span>
                    <span>Editar minha grade</span>
                </button>

                <button id="btn-reset-app" class="btn-tonal outline-btn">
                    <span class="material-symbols-rounded">home</span>
                    <span>Outro turno ou período</span>
                </button>
            </div>
        </div>
        <form id="selection-form" class="flow-form">

            <div class="form-group">
                <label for="course-input" class="label-zen">Curso</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded icon">search</span>
                    <input type="text" id="course-input" list="courses-list" placeholder="Ex: Sistemas para Internet"
                        autocomplete="off">
                    <datalist id="courses-list">
                        <option value="Sistemas para Internet">
                    </datalist>
                </div>
            </div>

            <div class="form-group">
                <label class="label-zen">Turno</label>
                <div class="choice-chips-wrapper" id="shift-selector">
                    <button type="button" class="choice-chip" data-value="matutino">Matutino</button>
                    <button type="button" class="choice-chip" data-value="noturno">Noturno</button>
                </div>
            </div>

            <div class="form-group">
                <label class="label-zen">Período</label>
                <div class="horizontal-scroll-wrapper">
                    <button type="button" id="btn-scroll-left" class="mini-arrow left hidden">
                        <span class="material-symbols-rounded">chevron_left</span>
                    </button>

                    <div class="chips-container" id="period-selector">
                        <button type="button" class="chip-btn" data-value="1">1º</button>
                        <button type="button" class="chip-btn" data-value="2">2º</button>
                        <button type="button" class="chip-btn" data-value="3">3º</button>
                        <button type="button" class="chip-btn" data-value="4">4º</button>
                        <button type="button" class="chip-btn" data-value="5">5º</button>
                        <button type="button" class="chip-btn" data-value="6">6º</button>
                    </div>

                    <button type="button" id="btn-scroll-right" class="mini-arrow right">
                        <span class="material-symbols-rounded">chevron_right</span>
                    </button>

                    <div class="scroll-fade"></div>
                </div>
            </div>

            <div id="form-feedback" class="feedback-msg hidden">
                <span class="material-symbols-rounded">error</span>
                Erro de validação.
            </div>

            <div class="action-area">
                <button type="button" id="btn-ver-horarios" class="cta-primary">
                    Consultar grade padrão
                </button>
                
                <button type="button" id="btn-form-custom-access" class="btn-tonal outline-btn">
                    <span class="material-symbols-rounded">tune</span>
                    <span id="text-form-custom-access">Montar minha grade</span>
                </button>
            </div>

        </form>
    </main>
    <script src="home.js"></script>
</body>

</html>
